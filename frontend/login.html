<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="api-base" content="http://localhost:5000/api" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — ThesisVault</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--cream);
      }
      .auth-card {
        width: 100%;
        max-width: 420px;
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 40px;
        box-shadow: var(--shadow-lg);
      }
      .auth-logo {
        text-align: center;
        margin-bottom: 32px;
      }
      .auth-logo .mark {
        font-family: 'DM Serif Display', serif;
        font-size: 28px;
        color: var(--navy);
      }
      .auth-logo .mark span {
        color: var(--gold);
      }
      .auth-logo p {
        font-size: 13px;
        color: var(--muted);
        margin-top: 4px;
      }
      .auth-title {
        font-family: 'DM Serif Display', serif;
        font-size: 22px;
        color: var(--navy);
        margin-bottom: 6px;
      }
      .auth-sub {
        font-size: 13.5px;
        color: var(--muted);
        margin-bottom: 28px;
      }
      .error-msg {
        background: #fcebeb;
        border: 1px solid #f7c1c1;
        border-radius: var(--radius-md);
        padding: 12px 14px;
        font-size: 13.5px;
        color: #a32d2d;
        margin-bottom: 18px;
        display: none;
      }
      .auth-footer {
        text-align: center;
        font-size: 13px;
        color: var(--muted);
        margin-top: 20px;
      }
      .auth-footer a {
        color: var(--gold);
        font-weight: 500;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="mark">Thesis<span>Vault</span></div>
        <p>University Thesis Submission Portal</p>
      </div>

      <h1 class="auth-title">Sign in</h1>
      <p class="auth-sub">Enter your university credentials to continue.</p>

      <div class="error-msg" id="error-msg"></div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input
          type="email"
          class="form-input"
          id="email"
          placeholder="you@uni.edu.ng"
          autocomplete="email"
        />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-input"
          id="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <button
        class="btn-primary"
        id="login-btn"
        style="width: 100%; justify-content: center; padding: 12px"
        onclick="doLogin()"
      >
        Sign in
      </button>

      <div class="auth-footer" style="margin-top: 16px">
        <p
          style="
            font-size: 12px;
            color: var(--muted);
            margin-top: 16px;
            padding: 12px;
            background: var(--cream);
            border-radius: var(--radius-md);
          "
        >
          <strong>Demo accounts:</strong><br />
          Student: a.okafor@uni.edu.ng / Student@123<br />
          Supervisor: s.obi@uni.edu.ng / Super@123<br />
          Admin: admin@thesisvault.edu / Admin@123456
        </p>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script>
      // Redirect if already logged in
      if (Auth.isLoggedIn()) window.location.href = 'index.html';

      async function doLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        const errEl = document.getElementById('error-msg');

        errEl.style.display = 'none';
        btn.textContent = 'Signing in…';
        btn.disabled = true;

        try {
          await Auth.login(email, password);
          window.location.href = 'index.html';
        } catch (err) {
          errEl.textContent = err.message || 'Invalid credentials';
          errEl.style.display = 'block';
          btn.textContent = 'Sign in';
          btn.disabled = false;
        }
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doLogin();
      });
    </script>
  </body>
</html>
