# render.yaml — Deploy ThesisVault to Render.com

services:
  # ── Node.js Backend API ────────────────────────────────────────────────
  - type: web
    name: thesisvault-api
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://thesisvault-frontend.onrender.com
      - key: MAX_FILE_SIZE_MB
        value: '100'
      - key: UPLOAD_DIR
        value: uploads

  # ── Static Frontend ────────────────────────────────────────────────────
  - type: web
    name: thesisvault-frontend
    env: static
    rootDir: frontend
    buildCommand: echo "No build needed"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /api/*
        destination: https://thesisvault-api.onrender.com/api/$1
      - type: rewrite
        source: /*
        destination: /index.html
