# render.yaml — Deploy ThesisVault to Render.com
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Node.js Backend API ──────────────────────────────────────────────────
  - type: web
    name: thesisvault-api
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: thesisvault-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://thesisvault.onrender.com
      - key: MAX_FILE_SIZE_MB
        value: "100"
      - key: UPLOAD_DIR
        value: uploads
      # Add your SMTP settings manually in the Render dashboard:
      # SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS, EMAIL_FROM

  # ── Static Frontend ──────────────────────────────────────────────────────
  - type: web
    name: thesisvault-frontend
    env: static
    rootDir: frontend
    buildCommand: echo "No build needed"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /api/*
        destination: https://thesisvault-api.onrender.com/api/$1

# ── PostgreSQL Database ──────────────────────────────────────────────────
databases:
  - name: thesisvault-db
    databaseName: thesisvault
    user: thesisvault_user
    plan: free
    region: oregon
